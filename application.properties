# ============================================================
# Universal Cafe — Spring Boot Config
# ============================================================

# Server
server.port=8080
spring.application.name=universal-cafe

# H2 Console (dev only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource (H2 dev / swap for MySQL in prod)
spring.datasource.url=jdbc:h2:mem:universalcafe
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS allowed origins (update before deployment)
# cors.allowed-origins=https://universalcafe.in

# Logging
logging.level.com.universalcafe=INFO
logging.level.org.springframework.web=WARN
