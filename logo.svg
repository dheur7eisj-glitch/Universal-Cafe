<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D4C41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4E342E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4E342E;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#D7B49E;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Steam wisps -->
  <path d="M88,28 Q84,18 88,10 Q92,2 88,0" stroke="url(#steamGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M100,30 Q96,18 100,8 Q104,0 100,0" stroke="url(#steamGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M112,28 Q108,18 112,10 Q116,2 112,0" stroke="url(#steamGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Coffee cup body -->
  <path d="M76,38 L78,82 Q78,88 84,88 L116,88 Q122,88 122,82 L124,38 Z" fill="url(#cupGrad)" rx="4"/>

  <!-- Cup highlight -->
  <path d="M82,44 L83,76 Q83,80 86,80 L94,80" stroke="#FFF8EE" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- Saucer -->
  <ellipse cx="100" cy="91" rx="28" ry="5" fill="#4E342E"/>
  <ellipse cx="100" cy="89" rx="26" ry="4" fill="#6D4C41"/>

  <!-- Cup handle -->
  <path d="M122,50 Q138,50 138,62 Q138,74 122,74" stroke="#4E342E" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M122,50 Q134,50 134,62 Q134,74 122,74" stroke="#6D4C41" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Coffee surface inside cup -->
  <ellipse cx="100" cy="42" rx="22" ry="5" fill="#2A1A14"/>
  <ellipse cx="100" cy="42" rx="14" ry="3" fill="#3E2723" opacity="0.6"/>

  <!-- Coffee bean decorative element -->
  <ellipse cx="56" cy="74" rx="10" ry="14" fill="#4E342E" transform="rotate(-20,56,74)"/>
  <path d="M56,60 Q56,74 56,88" stroke="#D7B49E" stroke-width="1.5" fill="none" stroke-linecap="round" transform="rotate(-20,56,74)"/>

  <!-- Brand Name -->
  <text x="150" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#4E342E" letter-spacing="1">Universal</text>
  <text x="154" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#8A9A5B" letter-spacing="6">CAFE</text>

  <!-- Tagline underline -->
  <line x1="150" y1="88" x2="292" y2="88" stroke="#D7B49E" stroke-width="1" opacity="0.7"/>
  <text x="151" y="100" font-family="Georgia, serif" font-size="9" fill="#D7B49E" letter-spacing="2.5" font-style="italic">Jharoda Kalan, Delhi</text>
</svg>
